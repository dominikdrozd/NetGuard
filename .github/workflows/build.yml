name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Tell rustc to use sparse registry (faster on CI)
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  # ------------------------------------------------------------------
  # Lint — informational on existing code, strict on new code via
  # --deny warnings for clippy once the tree is clean. Non-blocking
  # today (clippy / fmt reported, but never fail the PR).
  # ------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libnetfilter-queue-dev libnfnetlink-dev libmnl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint

      - name: cargo fmt --check
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: cargo clippy
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --no-deps -- -W clippy::all

  # ------------------------------------------------------------------
  # Rust tests. Most tests are pure logic (rule engine, config parse);
  # NFQUEUE-backed code paths are not exercised under unit tests so no
  # root privilege is required.
  # ------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libnetfilter-queue-dev libnfnetlink-dev libmnl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test

      - run: cargo test --workspace --no-fail-fast

  # ------------------------------------------------------------------
  # Frontend sanity check — type-check + vite build.
  # ------------------------------------------------------------------
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # setup-node's built-in npm cache requires a committed
      # frontend/package-lock.json. Until one is committed the cache path
      # would not resolve and the action hard-fails. We cache node_modules
      # manually via actions/cache so CI is fast either way.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-node-modules-${{ hashFiles('frontend/package.json', 'frontend/package-lock.json') }}
          restore-keys: |
            frontend-node-modules-

      - name: Install npm deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: vite build
        run: npm run build

  # ------------------------------------------------------------------
  # Release build — produces a self-contained tarball with the
  # daemon binary (frontend embedded via rust-embed), default config,
  # systemd unit, and deploy script. Matrix over x86_64 and aarch64.
  # aarch64 uses free GitHub ARM runners (available for public repos);
  # if unavailable on your plan, the job marks itself as failed but
  # won't block x86_64.
  # ------------------------------------------------------------------
  build:
    name: Build ${{ matrix.arch }}
    needs: [test, frontend]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            nfpm_arch: amd64
          - arch: aarch64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            nfpm_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libnetfilter-queue-dev libnfnetlink-dev libmnl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.arch }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-node-modules-${{ matrix.arch }}-${{ hashFiles('frontend/package.json', 'frontend/package-lock.json') }}
          restore-keys: |
            frontend-node-modules-${{ matrix.arch }}-

      - name: Build frontend
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Build daemon (release)
        run: cargo build --release --bin netguard --target ${{ matrix.target }}

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            # Strip leading 'v' for nfpm — versions must start with a digit.
            NFPM_VERSION="${VERSION#v}"
          else
            # Dev build: lexically sortable, all three formats accept dashes.
            TS="$(date -u +%s)"
            SHA="$(git rev-parse --short HEAD)"
            VERSION="dev-$SHA"
            NFPM_VERSION="0.0.0-dev.${TS}.${SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "nfpm_version=$NFPM_VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION (nfpm: $NFPM_VERSION)"

      - name: Install nfpm
        run: |
          NFPM_VERSION=2.41.0
          curl -fsSL -o /tmp/nfpm.tar.gz \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_${{ matrix.nfpm_arch }}.tar.gz"
          sudo tar -xzf /tmp/nfpm.tar.gz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build packages (deb, rpm, archlinux)
        env:
          NFPM_ARCH: ${{ matrix.nfpm_arch }}
          NFPM_VERSION: ${{ steps.version.outputs.nfpm_version }}
          CARGO_TARGET: ${{ matrix.target }}
        working-directory: packaging
        run: |
          mkdir -p ../dist
          for fmt in deb rpm archlinux; do
            nfpm pkg --packager "$fmt" --config nfpm.yaml --target ../dist/
          done
          ( cd ../dist && sha256sum netguard* > packages.sha256 )
          ls -la ../dist/

      - name: Package tarball
        id: package
        run: |
          PKG="netguard-${{ steps.version.outputs.version }}-${{ matrix.arch }}-linux"
          STAGE="dist/$PKG"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/netguard" "$STAGE/"
          cp config/netguard.toml "$STAGE/"
          cp systemd/netguard.service "$STAGE/"
          cp deploy.sh "$STAGE/"
          chmod +x "$STAGE/netguard" "$STAGE/deploy.sh"
          # Ship README + LICENSE if present (optional)
          for f in README.md LICENSE LICENSE.md; do
            [ -f "$f" ] && cp "$f" "$STAGE/" || true
          done
          (cd dist && tar -czf "$PKG.tar.gz" "$PKG" && sha256sum "$PKG.tar.gz" > "$PKG.tar.gz.sha256")
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: netguard-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.deb
            dist/*.rpm
            dist/*.pkg.tar.zst
            dist/packages.sha256
          retention-days: 30

  # ------------------------------------------------------------------
  # Smoke tests — install the just-built packages on a matching distro
  # container + assert the service starts + uninstall cleanly.
  # x86_64 only; aarch64 install-script parity is enforced by the shared
  # postinstall.sh, so re-running on an ARM container adds ~15 CI-minutes
  # for negligible new information.
  # ------------------------------------------------------------------
  smoke-deb:
    name: Smoke (deb / debian:12)
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    container:
      image: debian:12
      options: --privileged --cap-add=NET_ADMIN --cap-add=NET_RAW --cgroupns=host --tmpfs /tmp --tmpfs /run --tmpfs /run/lock
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: netguard-x86_64
          path: dist

      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y systemd systemd-sysv ca-certificates curl procps

      - name: Bootstrap systemd
        run: |
          # Start systemd in the background; wait for it to come up.
          exec /lib/systemd/systemd --system --unit=multi-user.target &
          for i in $(seq 1 10); do
            systemctl is-system-running 2>/dev/null && break || sleep 1
          done
          systemctl --version

      - name: Install package
        run: |
          apt-get install -y ./dist/netguard_*_amd64.deb
          systemctl status netguard --no-pager || true

      - name: Assert service active
        run: |
          for i in $(seq 1 15); do
            if systemctl is-active --quiet netguard; then
              echo "netguard active after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "netguard did not become active within 15s" >&2
          journalctl -u netguard --no-pager | tail -n 50 >&2
          exit 1

      - name: Uninstall
        run: |
          apt-get remove -y netguard
          test ! -f /lib/systemd/system/netguard.service || { echo "unit file leaked"; exit 1; }
          systemctl is-active --quiet netguard && { echo "service still active"; exit 1; } || true
          echo "clean removal"

  smoke-rpm:
    name: Smoke (rpm / fedora:40)
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    container:
      image: fedora:40
      options: --privileged --cap-add=NET_ADMIN --cap-add=NET_RAW --cgroupns=host --tmpfs /tmp --tmpfs /run --tmpfs /run/lock
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: netguard-x86_64
          path: dist

      - name: Install base tools
        run: |
          dnf install -y systemd ca-certificates curl procps-ng

      - name: Bootstrap systemd
        run: |
          exec /lib/systemd/systemd --system --unit=multi-user.target &
          for i in $(seq 1 10); do
            systemctl is-system-running 2>/dev/null && break || sleep 1
          done

      - name: Install package
        run: |
          dnf install -y ./dist/netguard-*.x86_64.rpm
          systemctl status netguard --no-pager || true

      - name: Assert service active
        run: |
          for i in $(seq 1 15); do
            if systemctl is-active --quiet netguard; then
              echo "netguard active after ${i}s"
              exit 0
            fi
            sleep 1
          done
          journalctl -u netguard --no-pager | tail -n 50 >&2
          exit 1

      - name: Uninstall
        run: |
          dnf remove -y netguard
          test ! -f /lib/systemd/system/netguard.service || { echo "unit file leaked"; exit 1; }
          echo "clean removal"

  smoke-arch:
    name: Smoke (archlinux)
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    container:
      image: archlinux:base
      options: --privileged --cap-add=NET_ADMIN --cap-add=NET_RAW --cgroupns=host --tmpfs /tmp --tmpfs /run --tmpfs /run/lock
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: netguard-x86_64
          path: dist

      - name: Install base tools
        run: |
          pacman -Sy --noconfirm
          pacman -S --noconfirm systemd ca-certificates curl procps-ng

      - name: Bootstrap systemd
        run: |
          exec /usr/lib/systemd/systemd --system --unit=multi-user.target &
          for i in $(seq 1 10); do
            systemctl is-system-running 2>/dev/null && break || sleep 1
          done

      - name: Install package
        run: |
          pacman -U --noconfirm ./dist/netguard-*.pkg.tar.zst
          systemctl status netguard --no-pager || true

      - name: Assert service active
        run: |
          for i in $(seq 1 15); do
            if systemctl is-active --quiet netguard; then
              echo "netguard active after ${i}s"
              exit 0
            fi
            sleep 1
          done
          journalctl -u netguard --no-pager | tail -n 50 >&2
          exit 1

      - name: Uninstall
        run: |
          pacman -R --noconfirm netguard
          test ! -f /lib/systemd/system/netguard.service || { echo "unit file leaked"; exit 1; }
          echo "clean removal"

  # ------------------------------------------------------------------
  # Release job — only runs on tag push (e.g. v0.2.0). Collects the
  # per-arch artifacts, attaches them to a GitHub release with
  # auto-generated release notes.
  # ------------------------------------------------------------------
  release:
    name: Release
    needs: [lint, test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Show artifacts
        run: ls -la release-artifacts/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## NetGuard ${{ github.ref_name }}

            Linux application firewall — Rust + React. See README for install.

            ### Install

            ```bash
            curl -fsSL -o netguard.tar.gz \
              https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/netguard-${{ github.ref_name }}-x86_64-linux.tar.gz
            tar -xzf netguard.tar.gz
            cd netguard-${{ github.ref_name }}-x86_64-linux
            ./deploy.sh                    # provisioning only
            ./deploy.sh --enable-mitm      # also flip HTTPS decrypt on
            ```

            Each tarball contains:
            - `netguard` — daemon binary (frontend embedded via rust-embed)
            - `netguard.toml` — default config
            - `netguard.service` — systemd unit
            - `deploy.sh` — installer

            Verify with `sha256sum -c netguard-*.tar.gz.sha256`.
